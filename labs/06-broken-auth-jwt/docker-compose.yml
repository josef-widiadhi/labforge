version: "3.9"
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: authuser
      POSTGRES_PASSWORD: authpass
    volumes:
      - ./src/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - lab06
  api:
    build: ./src
    ports:
      - "8006:3000"
    environment:
      DB_HOST: db
      DB_USER: authuser
      DB_PASS: authpass
      DB_NAME: authdb
      JWT_SECRET: secret123
    depends_on:
      - db
    networks:
      - lab06
networks:
  lab06:
    driver: bridge
