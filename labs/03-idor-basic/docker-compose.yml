version: "3.9"
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: bankdb
      POSTGRES_USER: bankuser
      POSTGRES_PASSWORD: bankpass
    volumes:
      - ./src/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - lab03

  api:
    build: ./src
    ports:
      - "8003:3000"
    environment:
      DB_HOST: db
      DB_USER: bankuser
      DB_PASS: bankpass
      DB_NAME: bankdb
    depends_on:
      - db
    networks:
      - lab03

networks:
  lab03:
    driver: bridge
