version: "3.9"
services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: blogdb
      MYSQL_USER: bloguser
      MYSQL_PASSWORD: blogpass
    volumes:
      - ./src/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - lab05

  api:
    build: ./src
    ports:
      - "8005:3000"
    environment:
      DB_HOST: db
      DB_USER: bloguser
      DB_PASS: blogpass
      DB_NAME: blogdb
    depends_on:
      - db
    networks:
      - lab05

networks:
  lab05:
    driver: bridge
