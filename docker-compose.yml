version: "3.9"

# ══════════════════════════════════════════════════════════════════════
#  LabForge — Master Docker Compose
#  Teacher/Admin starts this. Students connect to lab ports.
#
#  Start just the platform UI:
#    docker compose up -d labforge
#
#  Start UI + specific lab group:
#    docker compose --profile beginner up -d   (all 20 beginner labs)
#    docker compose --profile chain up -d      (6 chain/combo labs)
#    docker compose --profile all up -d        (everything ~8GB RAM)
#
#  Or use labforge.sh for a friendlier interface.
# ══════════════════════════════════════════════════════════════════════

services:

  # ── LABFORGE PLATFORM UI ────────────────────────────────────────────
  labforge:
    build: ./labforge-app
    container_name: labforge
    ports:
      - "3000:4000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/labs:ro
    environment:
      LABS_ROOT: /labs/labs
      OLLAMA_URL: http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ── BEGINNER LABS 01–20 ─────────────────────────────────────────────
