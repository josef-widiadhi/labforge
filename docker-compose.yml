    build: ./labs/01-sqli-basic/src
    container_name: lab01-sqli-basic
    ports: ["8001:3000"]
    environment: {DB_HOST: db01, DB_USER: admin, DB_PASS: admin123, DB_NAME: userdb}
    depends_on: [db01]
    networks: [net01]
    profiles: [lab01, beginner, all]
  db01:
    image: postgres:15-alpine
    container_name: db01
    environment: {POSTGRES_DB: userdb, POSTGRES_USER: admin, POSTGRES_PASSWORD: admin123}
    volumes: ["./labs/01-sqli-basic/src/init.sql:/docker-entrypoint-initdb.d/init.sql"]
    networks: [net01]
    profiles: [lab01, beginner, all]

