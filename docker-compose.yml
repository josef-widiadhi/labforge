    networks: [net02]
    profiles: [lab02, beginner, all]
  db02:
    image: mysql:8.0
    container_name: db02
    environment: {MYSQL_DATABASE: blinddb, MYSQL_USER: admin, MYSQL_PASSWORD: admin123, MYSQL_ROOT_PASSWORD: root}
    volumes: ["./labs/02-sqli-blind/src/init.sql:/docker-entrypoint-initdb.d/init.sql"]
    networks: [net02]
    profiles: [lab02, beginner, all]

