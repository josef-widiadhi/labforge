    profiles: [lab20, beginner, all]

  # ── HARDENED REFERENCE ──────────────────────────────────────────────
  lab21:
    build: ./labs/21-hardened/src
    container_name: lab21-hardened
    ports: ["8021:3000"]
    environment:
      NODE_ENV: production
      DB_HOST: db21
      DB_USER: appuser
      DB_PASS: ChangeThisInProd!
      DB_NAME: securedb
      REDIS_HOST: redis21
      REDIS_PASS: StrongRedisPass!
      JWT_SECRET: UseALong256BitRandomSecret!
    depends_on: [db21, redis21]
    networks: [net21]
    user: "1001:1001"
    read_only: true
    tmpfs: [/tmp:size=64m,noexec,nosuid]
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    profiles: [lab21, hardened, all]
  db21:
    image: postgres:15-alpine
    container_name: db21
    environment: {POSTGRES_DB: securedb, POSTGRES_USER: appuser, POSTGRES_PASSWORD: ChangeThisInProd!}
    volumes: ["./labs/21-hardened/src/init.sql:/docker-entrypoint-initdb.d/init.sql"]
    networks: [net21]
    profiles: [lab21, hardened, all]
  redis21:
    image: redis:7-alpine
    container_name: redis21
    command: redis-server --requirepass StrongRedisPass! --protected-mode yes
    networks: [net21]
    profiles: [lab21, hardened, all]

