<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>LabForge Replay</title>
<style>
:root{--bg:#050b10;--panel:#0d1f28;--panel2:#08141a;--border:#1d3d4b;--accent:#00d4ff;--accent2:#00ff9d;--text:#d6f3ff;--muted:#7ab8cc;--mono:'Consolas','Courier New',monospace;--warn:#ffb000}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;height:100vh;display:flex;flex-direction:column}.hdr{height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:var(--panel2);border-bottom:1px solid var(--border)}.layout{display:grid;grid-template-columns:330px minmax(0,1fr);height:calc(100vh - 56px)}.side{border-right:1px solid var(--border);padding:14px;background:var(--panel2);overflow:auto}.main{display:flex;flex-direction:column;min-width:0}.stat{padding:12px;border:1px solid var(--border);border-radius:10px;background:var(--panel);margin-bottom:10px}.label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}.v{font-size:22px;color:var(--accent2);font-weight:700}.controls{display:flex;gap:8px;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--panel2)}.btn{background:#0a1820;border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:6px;cursor:pointer;font-size:12px}.btn:hover{border-color:var(--accent)}.log{flex:1;overflow:auto;padding:16px;font-family:var(--mono);font-size:12px;line-height:1.6}.entry{margin-bottom:12px;padding:10px;border:1px solid var(--border);border-radius:8px;background:var(--panel)}.cmd{color:var(--accent2)}.out{color:var(--muted);white-space:pre-wrap;margin-top:6px}.grade{padding:14px;border-top:1px solid var(--border);background:var(--panel2)}input[type=range]{flex:1}
</style>
</head>
<body>
<div class="hdr"><div>⏮️ LabForge Replay <span id="title" style="color:var(--muted)">loading…</span></div><div><button class="btn" onclick="refreshData()">Refresh</button><button class="btn" onclick="generateGrade()">AI Grade</button></div></div>
<div class="layout">
  <div class="side">
    <div class="stat"><div class="label">Student</div><div class="v" id="student">—</div></div>
    <div class="stat"><div class="label">Template</div><div class="v" id="template">—</div></div>
    <div class="stat"><div class="label">Commands</div><div class="v" id="cmdCount">0</div></div>
    <div class="stat"><div class="label">Score</div><div class="v" id="score">0</div></div>
    <div class="stat"><div class="label">Target</div><div id="target" style="font-family:var(--mono);font-size:12px;color:var(--accent)">—</div></div>
  </div>
  <div class="main">
    <div class="controls">
      <button class="btn" onclick="jumpStart()">⏮ Start</button><button class="btn" onclick="play()">▶ Play</button><button class="btn" onclick="pause()">⏸ Pause</button>
      <input type="range" id="slider" min="0" max="0" value="0" oninput="seek(+this.value)"><span id="pos">0 / 0</span>
    </div>
    <div class="log" id="log"></div>
    <div class="grade"><div class="label">AI Grading Summary</div><div id="gradeText" style="font-size:13px;line-height:1.7;color:var(--text)">No summary generated yet.</div></div>
  </div>
</div>
<script>
const token = location.pathname.split('/').pop();
let replay = [], idx = 0, timer = null;
async function refreshData(){
  const r = await fetch(`/api/classroom/sessions/${token}/replay`); const d = await r.json();
  replay = d.timeline || []; idx = 0; document.getElementById('slider').max = Math.max(0, replay.length); document.getElementById('slider').value = 0;
  document.getElementById('student').textContent = d.session.studentName; document.getElementById('template').textContent = d.session.templateId;
  document.getElementById('cmdCount').textContent = replay.length; document.getElementById('score').textContent = d.session.score || 0; document.getElementById('target').textContent = d.session.targetUrl || '—';
  document.getElementById('title').textContent = `· ${d.session.studentName} · ${d.session.templateId}`; document.getElementById('gradeText').textContent = d.grade?.summary || 'No summary generated yet.'; render();
}
function render(){ const log=document.getElementById('log'); log.innerHTML = replay.slice(0, idx).map(e=>`<div class="entry"><div><strong>#${e.seq}</strong> <span style="color:var(--muted)">${new Date(e.at).toLocaleTimeString()}</span></div><div class="cmd">${escapeHtml(e.prompt || '')} ${escapeHtml(e.command || '')}</div><div class="out">${escapeHtml(String(e.output||'')).replace(/\n/g,'<br>')}</div></div>`).join('') || '<div style="color:var(--muted)">Replay idle. Press play or move the slider.</div>'; log.scrollTop = log.scrollHeight; document.getElementById('pos').textContent = `${idx} / ${replay.length}`; document.getElementById('slider').value = idx; }
function play(){ pause(); timer=setInterval(()=>{ if(idx>=replay.length){ pause(); return; } idx++; render(); }, 700); }
function pause(){ if(timer){ clearInterval(timer); timer=null; } }
function jumpStart(){ pause(); idx = 0; render(); }
function seek(v){ pause(); idx = v; render(); }
async function generateGrade(){ const r = await fetch(`/api/classroom/sessions/${token}/grade`, { method:'POST' }); const d = await r.json(); document.getElementById('gradeText').textContent = d.grade?.summary || 'No summary available.'; document.getElementById('score').textContent = d.grade?.heuristic?.total || document.getElementById('score').textContent; }
function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
refreshData();
</script>
</body>
</html>
